name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码仓库
      - uses: actions/checkout@v4
      
      # 2. 配置 JDK 11 环境
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      # 3. 赋予 gradlew 可执行权限（Linux/macOS 必需）
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # 4. 执行 Gradle 构建
      - name: Build with Gradle
        run: ./gradlew build
      
      # 5. （可选）上传构建产物作为 Artifact（方便下载）
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build-output
          path: |
            app/build/outputs/
            app/build/reports/
