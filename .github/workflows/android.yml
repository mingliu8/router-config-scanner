name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（必须第一步）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK（Android 新项目推荐 JDK 17，兼容 JDK 11 项目）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 赋予 gradlew 可执行权限（Linux 环境必需）
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行构建（用 assembleDebug 替代 build，大幅缩短构建时间）
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. 上传构建产物（APK、构建报告，方便下载）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: |
            app/build/outputs/apk/debug/
            app/build/reports/
